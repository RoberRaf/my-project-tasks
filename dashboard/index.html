<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FLOW Dashboard</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="readonly-banner" class="readonly-banner">View-only mode — data may not reflect latest changes</div>
  <div class="top-bar">
    <span class="top-bar-title">FLOW Dashboard</span>
    <div class="tab-group">
      <button class="tab-btn" data-mode="cycles">Cycles</button>
      <button class="tab-btn active" data-mode="tasks">Tasks</button>
    </div>
    <button id="pull-btn">Pull</button>
    <button id="push-btn">Push</button>
    <button id="refresh-btn">Refresh</button>
  </div>

  <div class="filter-bar">
    <input type="search" id="search-input" class="search-input" placeholder="Search tasks…">
    <div class="filter-separator"></div>
    <label class="filter-label" for="assignee-filter">Assignee:</label>
    <select id="assignee-filter" class="filter-select"></select>
  </div>

  <div id="board-container" class="board-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/board.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
